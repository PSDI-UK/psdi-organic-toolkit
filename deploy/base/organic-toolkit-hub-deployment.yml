apiVersion: apps/v1
kind: Deployment
metadata:
  name: psdi-organic-toolkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: psdi-organic-toolkit
  template:
    metadata:
      labels:
        app: psdi-organic-toolkit
      annotations:
        elastic.co/dataset: kubernetes.container_logs.psdi_organic_toolkit
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - psdi-organic-toolkit
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: psdi-organic-toolkit
          image: psdi-organic-toolkit
          volumeMounts:
            - mountPath: /tmp
              name: uploads
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi" # this value may need to increase if application stability declines
              cpu: "1000m"
      imagePullSecrets:
        - name: github-psdi-registry-credentials
      volumes:
        - name: uploads
          emptyDir:
            sizeLimit: 1Gi
