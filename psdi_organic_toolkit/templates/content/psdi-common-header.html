<!-- This is the common header which will be added to all pages. Everything in this file will be added within the div
 that loads it. Header links specific to each site must be added or loaded via JS after this is loaded.-->

<div class="max-width-box navbar">
  <div class="header-left">
    <div class="navbar__brand">
      <a class="navbar__logo" href="https://psdi.ac.uk/">
        <img src="{{url_for('static', filename='img/psdi-logo-darktext.png')}}" alt="PSDI logo"
          class="lm-only">
        <img src="{{url_for('static', filename='img/psdi-logo-lighttext.png')}}" alt="PSDI logo"
          class="dm-only">
      </a>
      <a class="navbar__title" href="{{get_url("index.html")}}">
        <h5>PSDI Organic Toolkit</h5>
      </a>
    </div>
  </div>
  <div class="navbar__items navbar__items--right">
    <!-- This file contains the links that will appear in the top-right of the header bar --> <a href="mailto: psdi@soton.ac.uk" class="navbar__item navbar__link" id="mail">Contact</a> <a href="javascript:void(0)" data-cc="show-preferencesModal" class="navbar__item navbar__link" id="contact-link">Manage Cookie Preferences</a>
    <button class="clean-btn color-mode-toggle" title="Switch between dark and light mode"
      aria-label="Lightmode/darkmode toggle button">
      <img src="{{url_for('static', filename='img/colormode-toggle-lm.svg')}}" alt="Lightmode toggle icon"
        class="lm-only">
      <img src="{{url_for('static', filename='img/colormode-toggle-dm.svg')}}" alt="Darkmode toggle icon"
        class="dm-only">
    </button>
  </div>
</div>
