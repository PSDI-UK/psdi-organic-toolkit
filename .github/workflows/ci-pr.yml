# Workflow for continuous integration tasks triggered on non-draft pull requests to main and release

name: CI - PRs
run-name: CI - PRs
on:
  workflow_dispatch:
  pull_request:
    types: ["opened", "edited", "reopened", "synchronize", "ready_for_review"]
    branches: ["main", "release"]
    # No need to run tests for doc-only changes, maintenance code, or deployment code not covered by tests
    paths-ignore:
      - "**.md"
      - "Dockerfile"
      - "LICENSE"
      - "**.txt"
      - "deploy/**"
      - "scripts/fetch-common-style.*"

jobs:
  test-python:
    if: github.event.pull_request.draft == false
    uses: PSDI-UK/psdi-github-workflows-public/.github/workflows/test-python.yml@b4c884a5fbaa96777c26f1ac6d4eac67531e2fc7
    with:
      source_dir: psdi_organic_toolkit

  test-gui:
    if: github.event.pull_request.draft == false
    name: Run a simple test of the gui locally
    uses: PSDI-UK/psdi-github-workflows-public/.github/workflows/test-gui.yml@b4c884a5fbaa96777c26f1ac6d4eac67531e2fc7
    with:
      simple: true
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
